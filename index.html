<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>白沙小学2026年春季学期教师个人课表查询</title>
<style>
* { -webkit-tap-highlight-color: transparent; box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: #f0f2f5; color: #333; min-height: 100vh; padding-bottom: 40px; }

header { 
    background: linear-gradient(135deg, #07c160 0%, #05a050 100%); 
    color: white; 
    padding: 20px 16px; 
    text-align: center; 
    position: sticky; 
    top: 0; 
    z-index: 100; 
    box-shadow: 0 2px 12px rgba(0,0,0,0.1); 
}
header h1 { font-size: 20px; font-weight: 600; letter-spacing: 1px; }
header .subtitle { font-size: 13px; color: rgba(255,255,255,0.85); margin-top: 6px; }

.search-card { 
    background: white; 
    margin: 16px 12px; 
    padding: 24px 20px; 
    border-radius: 16px; 
    box-shadow: 0 4px 16px rgba(0,0,0,0.06); 
}
.input-wrapper { position: relative; margin-bottom: 16px; }
#teacherInput { 
    width: 100%; 
    padding: 14px 16px; 
    font-size: 16px; 
    border: 1.5px solid #e0e0e0; 
    border-radius: 10px; 
    outline: none; 
    -webkit-appearance: none; 
    transition: all 0.2s;
}
#teacherInput:focus { border-color: #07c160; box-shadow: 0 0 0 3px rgba(7,193,96,0.1); }

.suggestions { 
    position: absolute; 
    top: 100%; 
    left: 0; 
    right: 0; 
    background: white; 
    border: 1px solid #e8e8e8; 
    border-radius: 10px; 
    margin-top: 6px; 
    max-height: 280px; 
    overflow-y: auto; 
    display: none; 
    z-index: 50; 
    box-shadow: 0 8px 24px rgba(0,0,0,0.12); 
}
.suggestion-item { 
    padding: 14px 16px; 
    cursor: pointer; 
    border-bottom: 1px solid #f5f5f5; 
    font-size: 15px; 
    display: flex; 
    align-items: center; 
    transition: background 0.15s;
}
.suggestion-item:last-child { border-bottom: none; }
.suggestion-item:before { content: "👤"; margin-right: 12px; font-size: 18px; }
.suggestion-item:active, .suggestion-item:hover { background: #f0f9f4; }
.suggestion-item .match { color: #07c160; font-weight: 700; }

.btn { 
    width: 100%; 
    padding: 14px; 
    background: linear-gradient(135deg, #07c160 0%, #05a050 100%); 
    color: white; 
    border: none; 
    border-radius: 10px; 
    font-size: 16px; 
    font-weight: 600; 
    cursor: pointer; 
    -webkit-appearance: none; 
    transition: transform 0.1s, box-shadow 0.2s;
    box-shadow: 0 4px 12px rgba(7,193,96,0.3);
}
.btn:active { transform: scale(0.98); box-shadow: 0 2px 6px rgba(7,193,96,0.2); }

.result-card { 
    background: white; 
    margin: 16px 12px; 
    border-radius: 16px; 
    overflow: hidden; 
    box-shadow: 0 4px 16px rgba(0,0,0,0.06); 
    display: none; 
}
.result-header { 
    padding: 18px 16px; 
    background: #fafafa; 
    border-bottom: 1px solid #f0f0f0; 
    display: flex; 
    justify-content: space-between; 
    align-items: center; 
}
.result-header h3 { font-size: 16px; color: #333; font-weight: 600; }
.result-header .count { 
    font-size: 13px; 
    color: #07c160; 
    background: #e8f5e9; 
    padding: 5px 12px; 
    border-radius: 20px; 
    font-weight: 500;
}

.table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; padding: 4px; }
table { 
    width: 100%; 
    min-width: 600px; 
    border-collapse: separate; 
    border-spacing: 0; 
    font-size: 14px; 
    border-radius: 8px; 
    overflow: hidden;
}
th { 
    background: #07c160; 
    color: white; 
    padding: 12px 8px; 
    font-weight: 600; 
    white-space: nowrap; 
    position: sticky; 
    top: 0; 
    font-size: 13px;
}
td { 
    border: 1px solid #f0f0f0; 
    padding: 10px 6px; 
    text-align: center; 
    vertical-align: middle; 
    min-width: 100px; 
    line-height: 1.6; 
    background: white;
}
tr:nth-child(even) td { background: #fafafa; }
tr:hover td { background: #f0f9f4; }

.period-col { 
    background: #f5f5f5 !important; 
    font-weight: 700; 
    color: #555; 
    position: sticky; 
    left: 0; 
    min-width: 50px; 
    box-shadow: 2px 0 4px rgba(0,0,0,0.05); 
    z-index: 10; 
    border-right: 2px solid #e0e0e0;
}
.empty-cell { color: #ddd; background: #fafafa !important; font-size: 18px; }
.class-tag { 
    display: block; 
    font-size: 12px; 
    color: #888; 
    margin-top: 3px; 
    font-weight: 500;
}
.teacher-name-display {
    font-weight: 600;
    color: #333;
    font-size: 14px;
}

.empty-state { text-align: center; padding: 60px 20px; color: #999; display: none; }
.empty-state .icon { font-size: 56px; margin-bottom: 16px; }
.empty-state .msg { font-size: 15px; color: #666; }

.footer { 
    text-align: center; 
    padding: 24px; 
    font-size: 12px; 
    color: #bbb; 
    margin-top: 20px;
}

.no-data { text-align: center; padding: 60px 20px; color: #999; display: none; }
.no-data .icon { font-size: 48px; margin-bottom: 12px; }
</style>
</head>
<body>

<header>
    <h1>📚 白沙小学2026年春季学期教师个人课表</h1>
    <div class="subtitle">输入姓名即可查询个人课表</div>
</header>

<div class="search-card">
    <div class="input-wrapper">
        <input type="text" id="teacherInput" placeholder="请输入教师姓名（如：王丽君）" autocomplete="off">
        <div id="suggestions" class="suggestions"></div>
    </div>
    <button class="btn" onclick="generateSchedule()">🔍 查询课表</button>
</div>

<div id="resultCard" class="result-card">
    <div class="result-header">
        <h3>📋 课表详情</h3>
        <span id="courseCount" class="count"></span>
    </div>
    <div class="table-scroll">
        <div id="scheduleContainer"></div>
    </div>
</div>

<div id="emptyState" class="empty-state">
    <div class="icon">😕</div>
    <div class="msg" id="emptyText">未找到该教师的课表</div>
</div>

<div id="noDataState" class="no-data">
    <div class="icon">⚙️</div>
    <div>数据未配置，请先用管理端生成数据</div>
</div>

<div class="footer">白沙小学教务系统 · 2026年春季学期</div>

<script>
// ===================== 数据配置区 =====================
// 请把管理端「复制为在线版数据」生成的代码，粘贴到下面两行注释之间

// ===== 粘贴数据开始 =====
const SCHEDULE_DATA = [];
// ===== 粘贴数据结束 =====

// ===================== 程序逻辑 =====================
const weekNames = ["星期一","星期二","星期三","星期四","星期五"];
const periodNames = ["1","2","3","4","午休","5","6"];

// 检查数据是否为空
if (!SCHEDULE_DATA || SCHEDULE_DATA.length === 0) {
    document.querySelector('.search-card').style.display = 'none';
    document.getElementById('noDataState').style.display = 'block';
    throw new Error("数据未配置");
}

// 提取并排序教师列表（去重）
const teacherList = [...new Set(SCHEDULE_DATA.map(function(r) { return r.teacher; }))].sort(function(a,b) { return a.localeCompare(b, 'zh-CN'); });

const input = document.getElementById('teacherInput');
const suggestionsBox = document.getElementById('suggestions');
const resultCard = document.getElementById('resultCard');
const scheduleContainer = document.getElementById('scheduleContainer');
const emptyState = document.getElementById('emptyState');
const emptyText = document.getElementById('emptyText');

// 输入时实时检索
input.addEventListener('input', function() {
    var val = this.value.trim();
    suggestionsBox.innerHTML = '';
    
    if (!val) { 
        suggestionsBox.style.display = 'none'; 
        return; 
    }
    
    var matches = teacherList.filter(function(t) { return t.indexOf(val) !== -1; });
    
    if (matches.length === 0) { 
        suggestionsBox.style.display = 'none'; 
        return; 
    }
    
    matches.forEach(function(name) {
        var div = document.createElement('div');
        div.className = 'suggestion-item';
        
        var regex = new RegExp('(' + val.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
        var highlightedName = name.replace(regex, '<span class="match">$1</span>');
        
        div.innerHTML = '<span style="flex:1;">' + highlightedName + '</span>';
        div.onclick = function() {
            input.value = name;
            suggestionsBox.style.display = 'none';
            generateSchedule();
        };
        suggestionsBox.appendChild(div);
    });
    
    suggestionsBox.style.display = 'block';
});

// 点击外部关闭建议框
document.addEventListener('click', function(e) {
    if (!e.target.closest('.input-wrapper')) {
        suggestionsBox.style.display = 'none';
    }
});

// 回车键查询
input.addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
        suggestionsBox.style.display = 'none';
        generateSchedule();
    }
});

function generateSchedule() {
    var name = input.value.trim();
    if (!name) { 
        input.focus(); 
        return; 
    }
    
    var records = SCHEDULE_DATA.filter(function(r) { return r.teacher === name; });
    
    suggestionsBox.style.display = 'none';
    
    if (records.length === 0) {
        resultCard.style.display = 'none';
        emptyState.style.display = 'block';
        emptyText.textContent = '未找到「' + name + '」的课表，请检查姓名';
        return;
    }
    
    emptyState.style.display = 'none';
    resultCard.style.display = 'block';
    document.getElementById('courseCount').textContent = '共 ' + records.length + ' 节课';
    
    // 构建矩阵
    var matrix = {};
    records.forEach(function(r) {
        if (!matrix[r.period]) matrix[r.period] = {};
        if (!matrix[r.period][r.week]) matrix[r.period][r.week] = [];
        matrix[r.period][r.week].push({course: r.course, className: r.className, teacher: r.teacher});
    });
    
    // 生成表格HTML
    var html = '<table><thead><tr><th class="period-col">节次</th>';
    weekNames.forEach(function(day) { html += '<th>' + day + '</th>'; });
    html += '</tr></thead><tbody>';
    
    periodNames.forEach(function(period) {
        html += '<tr><td class="period-col">' + period + '</td>';
        weekNames.forEach(function(day) {
            var items = matrix[period] && matrix[period][day] ? matrix[period][day] : [];
            if (items.length > 0) {
                var cellContent = items.map(function(it) {
                    // 判断是否为午休或课程名为空/（无课程名）
                    var courseName = it.course ? it.course.trim() : '';
                    if (courseName === '' || courseName === '（无课程名）') {
                        // 午休时段：显示教师姓名 + 班级
                        return '<span class="teacher-name-display">' + it.teacher + '</span><span class="class-tag">' + it.className + '</span>';
                    } else {
                        // 正常课程：显示课程名 + 班级
                        return it.course + '<span class="class-tag">' + it.className + '</span>';
                    }
                }).join('<br><br>');
                html += '<td>' + cellContent + '</td>';
            } else {
                html += '<td class="empty-cell">—</td>';
            }
        });
        html += '</tr>';
    });
    
    html += '</tbody></table>';
    scheduleContainer.innerHTML = html;
}
</script>
</body>
</html>
